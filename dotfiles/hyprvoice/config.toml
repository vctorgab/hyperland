# Hyprvoice Configuration
# Generated by hyprvoice onboarding or configure
# Changes are applied immediately without daemon restart.

# API Keys for providers
[providers.openai]
  api_key = ""

# Audio Recording Configuration
[recording]
  sample_rate = 16000
  channels = 1
  format = "s16"
  buffer_size = 8192
  device = ""
  channel_buffer_size = 30
  timeout = "5m0s"

# Speech Transcription Configuration
[transcription]
  provider = "openai"
  language = "es"
  model = "whisper-1"
  streaming = false
  threads = 0

# LLM Post-Processing Configuration
[llm]
  enabled = false

  [llm.post_processing]
    remove_stutters = false
    add_punctuation = false
    fix_grammar = false
    remove_filler_words = false

  [llm.custom_prompt]
    enabled = false

# Text Injection Configuration
[injection]
  backends = ["ydotool", "wtype", "clipboard"]
  ydotool_timeout = "5s"
  wtype_timeout = "5s"
  clipboard_timeout = "3s"

# Desktop Notification Configuration
[notifications]
  enabled = true
  type = "desktop"
