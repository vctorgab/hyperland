# Configuración dinámica: El portátil se activa solo si no hay otro monitor, 
# o se pone a la derecha si conectas el externo.

# Monitor Portátil (eDP-1): Resolución nativa, posición automática (derecha si hay otro), escala 2.
monitor=eDP-1, 3000x2000@60, auto, 2

# Monitor Externo (DP-1): Resolución nativa, posición 0x0 (izquierda), escala 1.
monitor=DP-1, preferred, 0x0, 1

# Regla de respaldo para cualquier otro monitor
monitor=,preferred,auto,1
