# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua



# Misc
misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}

# Monitors
# Monitor Configs
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf

# Monitors
# monitor = eDP-1, 3000x2000@60, 0x0, 2
# monitor = DP-1, 1920x1080@60, 1500x0, 1

# Keyboard Layout
input {
    kb_layout = us
    kb_variant = intl
}

$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = hyprlauncher

# Autostart
exec-once = waybar
exec-once = awww-daemon && sleep 1 && awww img /home/gabriel/Downloads/2.jpg
# Clipboard and Sync
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-paste --watch wl-copy --primary


gestures {
    # 4 dedos para cambiar de escritorio
    gesture = 4, horizontal, workspace

    # 3 dedos para Firefox (usando wtype)
    gesture = 3, up, dispatcher, exec, wtype -M ctrl t -m ctrl
    gesture = 3, down, dispatcher, exec, wtype -M ctrl w -m ctrl
    gesture = 3, left, dispatcher, exec, wtype -M ctrl -k Page_Up -m ctrl
    gesture = 3, right, dispatcher, exec, wtype -M ctrl -k Page_Down -m ctrl
    
    workspace_swipe_distance = 300
    workspace_swipe_invert = false
}

# Basic Binds
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, exec, wlogout
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, movefocus, d # O podrías dejarlo libre, lo muevo a focus down por si acaso o simplemente lo borro
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mainMod SHIFT, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, Tab, exec, /home/gabriel/.local/bin/smart_tab.sh
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, B, exec, firefox
bind = $mainMod, N, exec, /home/gabriel/.local/bin/rotate_wallpaper.sh
bind = $mainMod CONTROL, up, fullscreen, 1
bind = $mainMod CONTROL, down, fullscreen, 1

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod ALT, left, resizeactive, -40 0
bind = $mainMod ALT, right, resizeactive, 40 0
bind = $mainMod ALT, up, resizeactive, 0 -40
bind = $mainMod ALT, down, resizeactive, 0 40

# Switch workspaces with mainMod + [0-5]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move active window to a workspace with mainMod + SHIFT + [0-5]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Hyprvoice - dictado por voz
bind = $mainMod, H, exec, hyprvoice toggle
bind = , mouse:275, exec, hyprvoice toggle

# Volumen
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brillo
bind = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Configuración específica para el touchpad Bluetooth Brydge
device {
    name = brydge-w-touch-touchpad
    sensitivity = 0.7
}

# Configuración específica para el Trackball Kensington (botones invertidos)
device {
    name = kensington-slimblade-pro(2.4ghz-receiver)-kensington-slimblade-pro-trackball(2.4ghz-receiver)
    left_handed = true
}
